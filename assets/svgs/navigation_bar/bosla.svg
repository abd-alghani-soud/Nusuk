<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
    <defs>
        <radialGradient id="dialGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
            <stop offset="0%" stop-color="#fcfbf4" />
            <stop offset="70%" stop-color="#f3efe0" />
            <stop offset="100%" stop-color="#dfd9bf" />
        </radialGradient>

        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2d6a4f" />
            <stop offset="50%" stop-color="#1b4332" />
            <stop offset="100%" stop-color="#081c15" />
        </linearGradient>

        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d4af37" />
            <stop offset="50%" stop-color="#aa7c11" />
            <stop offset="100%" stop-color="#8a640f" />
        </linearGradient>

        <linearGradient id="greenLight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#52b788" />
            <stop offset="100%" stop-color="#2d6a4f" />
        </linearGradient>
    </defs>

    <g stroke="#e2e2d9" stroke-width="1">
        <line x1="400" y1="100" x2="400" y2="700" />
        <line x1="200" y1="400" x2="600" y2="400" />
        <rect x="230" y="230" width="340" height="340" fill="none" />
        <line x1="230" y1="230" x2="570" y2="570" />
        <line x1="570" y1="230" x2="230" y2="570" />
    </g>

    <g id="top-ring">
        <circle cx="400" cy="110" r="45" fill="none" stroke="url(#ringGrad)" stroke-width="14" />
        <circle cx="400" cy="110" r="45" fill="none" stroke="#52b788" stroke-width="2" opacity="0.4" />
        <rect x="375" y="140" width="50" height="30" rx="5" fill="url(#ringGrad)" />
        <rect x="380" y="145" width="40" height="5" fill="#52b788" opacity="0.6" />
    </g>

    <circle cx="400" cy="450" r="240" fill="url(#ringGrad)" filter="drop-shadow(0px 15px 20px rgba(0,0,0,0.15))" />
    <circle cx="400" cy="450" r="238" fill="none" stroke="#74c69d" stroke-width="2" opacity="0.5" />
    <circle cx="400" cy="450" r="220" fill="none" stroke="#1b4332" stroke-width="6" />

    <circle cx="400" cy="450" r="210" fill="url(#dialGrad)" stroke="url(#goldGrad)" stroke-width="4" />
    <circle cx="400" cy="450" r="195" fill="none" stroke="#2d6a4f" stroke-width="2" stroke-dasharray="6,4" />

    <circle cx="400" cy="450" r="180" fill="none" stroke="#1b4332" stroke-width="2" />
    <circle cx="400" cy="450" r="165" fill="none" stroke="#1b4332" stroke-width="1" />

    <g font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1b4332" text-anchor="middle">
        <text x="400" y="285">0</text>
        <text x="515" y="315">30</text>
        <text x="565" y="370">60</text>
        <text x="565" y="545">120</text>
        <text x="515" y="600">160</text>
        <text x="400" y="625">180</text>
        <text x="285" y="600">210</text>
        <text x="235" y="545">240</text>
        <text x="235" y="370">300</text>
        <text x="285" y="315">330</text>
    </g>

    <g font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1b4332" text-anchor="middle">
        <text x="485" y="365">NE</text>
        <text x="485" y="550">SE</text>
        <text x="315" y="550">SW</text>
        <text x="315" y="365">NW</text>
    </g>

    <g id="wind-rose" transform="translate(400, 450)">
        <path d="M 0,-130 L 15,-40 L 130,0 L 15,40 L 0,130 L -15,40 L -130,0 L -15,-40 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" />

        <polygon points="0,0 25,-25 0,-110" fill="#2d6a4f" />
        <polygon points="0,0 25,-25 110,0" fill="#1b4332" />
        <polygon points="0,0 25,25 110,0" fill="#2d6a4f" />
        <polygon points="0,0 25,25 0,110" fill="#1b4332" />
        <polygon points="0,0 -25,25 0,110" fill="#2d6a4f" />
        <polygon points="0,0 -25,25 -110,0" fill="#1b4332" />
        <polygon points="0,0 -25,-25 -110,0" fill="#2d6a4f" />
        <polygon points="0,0 -25,-25 0,-110" fill="#1b4332" />

        <polygon points="0,0 0,-150 18,-35" fill="#52b788" />
        <polygon points="0,0 0,-150 -18,-35" fill="#2d6a4f" />
        <line x1="0" y1="0" x2="0" y2="-150" stroke="#fff" stroke-width="1" opacity="0.4" />
        <polygon points="0,0 0,150 -18,35" fill="#52b788" />
        <polygon points="0,0 0,150 18,35" fill="#2d6a4f" />

        <polygon points="0,0 150,0 35,18" fill="#52b788" />
        <polygon points="0,0 150,0 35,-18" fill="#2d6a4f" />

        <polygon points="0,0 -150,0 -35,-18" fill="#52b788" />
        <polygon points="0,0 -150,0 -35,18" fill="#2d6a4f" />

        <circle cx="0" cy="0" r="28" fill="url(#ringGrad)" stroke="url(#goldGrad)" stroke-width="3" />
        <circle cx="0" cy="0" r="18" fill="url(#dialGrad)" />
        <circle cx="0" cy="0" r="10" fill="url(#greenLight)" />
        <circle cx="-3" cy="-3" r="3" fill="#fff" opacity="0.6" /> </g>

    <g font-family="Georgia, Times New Roman, serif" font-size="36" font-weight="bold" fill="#081c15" text-anchor="middle">
        <text x="400" y="255">N</text>
        <text x="400" y="675">S</text>
        <text x="615" y="462">E</text>
        <text x="315" y="462">W</text>
    </g>
</svg>