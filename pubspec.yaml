name: nusuk
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # State Management & Architecture
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  get_it: ^9.2.1
  injectable: ^3.0.0 # ضفتها هون لأنها مكملة لـ get_it و injectable_generator

  # Networking & Tools
  http: ^1.6.0
  internet_connection_checker: ^3.0.1
  intl: ^0.20.2
  easy_localization: ^3.0.8

  # UI / UX Utilities & Responsive Design
  flutter_screenutil: ^5.9.3
  animated_theme_switcher: ^2.0.10
  flutter_svg: ^2.3.0

  # Animations & Loading Indicators
  flutter_animate: ^4.5.2
  lottie: ^3.3.3
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.2
  loading_animation_widget: ^1.3.0
  bot_toast: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9 # تم تحديثه ليتوافق مع الأدوات الحديثة
  injectable_generator: ^3.0.2

flutter:
  uses-material-design: true

  # لا تنسى مستقبلاً تضيف مسارات الـ Assets هون متل الـ JSON والـ SVGs:
  # assets:
  #   - assets/json/
  #   - assets/icons/